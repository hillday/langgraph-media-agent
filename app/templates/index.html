<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星流 Video Agent</title>
    <style>
      :root {
        --bg: #0b0f1a;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-2: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.12);
        --text: #e9ecf7;
        --muted: rgba(233, 236, 247, 0.65);
        --accent: #7c5cff;
        --accent-2: #2fe5c5;
        --danger: #ff4d6d;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, Arial, sans-serif;
        background: radial-gradient(1200px 900px at 30% 10%, rgba(124, 92, 255, 0.22), transparent 60%),
          radial-gradient(1200px 900px at 70% 20%, rgba(47, 229, 197, 0.14), transparent 55%),
          var(--bg);
        color: var(--text);
      }
      * {
        box-sizing: border-box;
      }
      a {
        color: var(--accent-2);
        text-decoration: none;
      }
      .layout {
        height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
      }
      .sidebar {
        border-right: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.18);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: 0.2px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand small {
        color: var(--muted);
        font-weight: 600;
      }
      .primary-btn {
        border: 0;
        cursor: pointer;
        border-radius: 12px;
        padding: 10px 12px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: #08101f;
        font-weight: 800;
      }
      .sessions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow: auto;
        padding-right: 4px;
      }
      .session {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 12px;
        padding: 10px;
        cursor: pointer;
      }
      .session:hover {
        background: var(--panel-2);
      }
      .session .meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }
      .session .id {
        font-weight: 800;
        font-size: 12px;
        color: var(--muted);
      }
      .badge {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .session .desc {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 18px 18px 16px;
        gap: 12px;
      }
      .header {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 14px;
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .title {
        font-weight: 900;
      }
      .subtitle {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      .chat {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 14px;
        padding: 14px;
        overflow: auto;
      }
      .msg {
        display: flex;
        gap: 10px;
        margin: 10px 0;
      }
      .avatar {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.10);
        border: 1px solid var(--border);
        display: grid;
        place-items: center;
        font-size: 12px;
        color: var(--muted);
        flex: none;
      }
      .bubble {
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.14);
        border-radius: 14px;
        padding: 10px 12px;
        max-width: 860px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.5;
      }
      .msg.user {
        justify-content: flex-end;
      }
      .msg.user .bubble {
        background: rgba(124, 92, 255, 0.16);
      }
      .msg.user .avatar {
        order: 2;
      }
      .muted {
        color: var(--muted);
        font-size: 13px;
      }
      .muted .bubble {
        padding: 6px 10px;
        font-size: 13px;
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.06);
      }
      .danger {
        color: var(--danger);
      }
      .danger .bubble {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.25);
      }
      .success .bubble {
        background: rgba(34, 197, 94, 0.10);
        border-color: rgba(34, 197, 94, 0.20);
        color: #22c55e;
      }
      .composer {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 14px;
        padding: 12px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }
      textarea {
        width: 100%;
        min-height: 72px;
        resize: vertical;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.18);
        color: var(--text);
        outline: none;
      }
      input[type="file"] {
        width: 100%;
        margin-top: 8px;
        color: var(--muted);
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .ghost-btn {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 700;
      }
      .ghost-btn:disabled,
      .primary-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }
      .upload-row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .upload-input {
        display: none;
      }
      .upload-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(15, 18, 29, 0.95);
        color: #fff;
        border-radius: 14px;
        padding: 12px 16px;
        cursor: pointer;
        font-weight: 800;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
        transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      }
      .upload-btn:hover {
        transform: translateY(-1px);
        background: rgba(22, 26, 40, 0.98);
        border-color: rgba(124, 92, 255, 0.32);
      }
      .upload-btn::before {
        content: "+";
        width: 18px;
        height: 18px;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 14px;
        line-height: 1;
      }
      .upload-files {
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
      }
      .upload-preview {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
        gap: 10px;
        margin-top: 10px;
      }
      .upload-thumb {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 14px;
        padding: 8px;
      }
      .upload-thumb img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 10px;
      }
      .upload-thumb-name {
        font-size: 11px;
        color: var(--muted);
        margin-top: 6px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .upload-thumb-remove {
        width: 100%;
        margin-top: 8px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 10px;
        padding: 6px 8px;
        cursor: pointer;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div>星流 <small>Video Agent</small></div>
          <span class="badge" id="api-status">API</span>
        </div>
        <button class="primary-btn" id="new-chat">+ 新对话</button>
        <div class="sessions" id="sessions"></div>
        <div class="hint">提示：对话会保存在 runs 目录，刷新页面也能继续。</div>
      </aside>

      <main class="main">
        <div class="header">
          <div>
            <div class="title">对话生成视频</div>
            <div class="subtitle" id="current-meta">未选择会话</div>
          </div>
        </div>

        <section class="chat" id="chat"></section>

        <section class="composer">
          <div>
            <textarea
              id="input"
              placeholder="描述你要做的视频（可包含时长/比例/风格/文案/素材要求）。例如：做一个 15s 9:16 的 TikTok 风格冲锋衣介绍视频…"
            ></textarea>
            <div class="upload-row">
              <label class="upload-btn" for="images">上传参考素材</label>
              <div class="upload-files" id="image-files">可上传最多 9 张图片，优先作为最终视频素材图</div>
            </div>
            <input class="upload-input" id="images" type="file" name="images" accept="image/*" multiple />
            <div class="upload-preview" id="image-preview"></div>
            <div class="hint" id="hint">点击发送后会立即返回 session_id，后台生成中可看到进度。</div>
          </div>
          <div class="row">
            <button class="ghost-btn" id="send-feedback" disabled>发送反馈</button>
            <button class="primary-btn" id="send">发送</button>
          </div>
        </section>
      </main>
    </div>

    <script>
      const sessionsEl = document.getElementById("sessions");
      const chatEl = document.getElementById("chat");
      const inputEl = document.getElementById("input");
      const imagesEl = document.getElementById("images");
      const imageFilesEl = document.getElementById("image-files");
      const imagePreviewEl = document.getElementById("image-preview");
      const sendBtn = document.getElementById("send");
      const feedbackBtn = document.getElementById("send-feedback");
      const newChatBtn = document.getElementById("new-chat");
      const metaEl = document.getElementById("current-meta");
      const apiStatusEl = document.getElementById("api-status");

      const MAX_UPLOAD_IMAGES = 9;
      let currentSessionId = "";
      let pollTimer = null;
      let lastProgressLen = 0;
      let selectedImages = [];
      let previewUrls = [];
      const terminalStages = new Set(["done", "failed"]);

      function fileSignature(file) {
        return `${file.name}::${file.size}::${file.lastModified}`;
      }

      function clearPreviewUrls() {
        for (const url of previewUrls) URL.revokeObjectURL(url);
        previewUrls = [];
      }

      function renderSelectedImages(statusText = "") {
        clearPreviewUrls();
        const count = selectedImages.length;
        imageFilesEl.textContent = statusText || (count
          ? `已选择 ${count}/${MAX_UPLOAD_IMAGES} 张图片`
          : "可上传最多 9 张图片，优先作为最终视频素材图");
        imagePreviewEl.innerHTML = "";

        for (const file of selectedImages) {
          const signature = fileSignature(file);
          const item = document.createElement("div");
          item.className = "upload-thumb";

          const img = document.createElement("img");
          const previewUrl = URL.createObjectURL(file);
          previewUrls.push(previewUrl);
          img.src = previewUrl;
          img.alt = file.name;

          const name = document.createElement("div");
          name.className = "upload-thumb-name";
          name.textContent = file.name;

          const removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "upload-thumb-remove";
          removeBtn.textContent = "移除";
          removeBtn.onclick = () => {
            selectedImages = selectedImages.filter((candidate) => fileSignature(candidate) !== signature);
            renderSelectedImages();
          };

          item.appendChild(img);
          item.appendChild(name);
          item.appendChild(removeBtn);
          imagePreviewEl.appendChild(item);
        }
      }

      function addMessage(role, text, extraClass = "") {
        const msg = document.createElement("div");
        msg.className = `msg ${role} ${extraClass}`.trim();
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "你" : "AI";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;
        msg.appendChild(avatar);
        msg.appendChild(bubble);
        chatEl.appendChild(msg);
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function setActions(session) {
        const canFeedback = !!currentSessionId;
        feedbackBtn.disabled = !canFeedback;
      }

      function stopPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      function startPolling(sessionId) {
        stopPolling();
        pollTimer = setInterval(() => pollSession(sessionId), 1200);
      }

      async function fetchSessions() {
        try {
          const r = await fetch("/api/sessions");
          apiStatusEl.textContent = r.ok ? "API OK" : "API";
          const sessions = (await r.json()) || [];
          sessionsEl.innerHTML = "";
          for (const s of sessions) {
            const div = document.createElement("div");
            div.className = "session";
            div.onclick = () => selectSession(s.session_id);
            div.innerHTML = `
              <div class="meta">
                <div class="id">${s.session_id}</div>
                <span class="badge">${s.stage || "unknown"}</span>
              </div>
              <div class="desc">${(s.user_request || "").replace(/</g, "&lt;")}</div>
            `;
            sessionsEl.appendChild(div);
          }
        } catch (e) {
          apiStatusEl.textContent = "API ERR";
        }
      }

      async function pollSession(sessionId) {
        try {
          const r = await fetch(`/api/sessions/${sessionId}`);
          if (!r.ok) return null;
          const session = await r.json();
          if (sessionId !== currentSessionId) return session;
          metaEl.textContent = `${session.session_id} · ${session.stage || "unknown"}`;
          setActions(session);

          const progress = session.progress || [];
          if (progress.length > lastProgressLen) {
            for (const line of progress.slice(lastProgressLen)) {
              const isDone = line.includes("done:") || line.includes("Render done:");
              addMessage("assistant", line, isDone ? "success" : "muted");
            }
            lastProgressLen = progress.length;
          }

          if (session.stage === "clarification_needed") {
            const qs = session.clarification_questions || [];
            if (qs.length) {
              addMessage("assistant", "需要你确认几个问题：\n" + qs.map((q, i) => `${i + 1}. ${q}`).join("\n"));
            }
          }
          if (session.stage === "failed" && session.last_error) {
            addMessage("assistant", "执行失败：\n" + session.last_error, "danger");
          }
          if (session.stage === "done" && session.render_output_path) {
            chatEl.insertAdjacentHTML("beforeend", `
              <div class="msg assistant success">
                <div class="avatar">AI</div>
                <div class="bubble">
                  渲染完成：<a href="/runs/${session.session_id}/project/output.mp4" target="_blank" download style="text-decoration: underline; color: inherit;">点击下载视频</a>
                </div>
              </div>
            `);
            chatEl.scrollTop = chatEl.scrollHeight;
          }
          if (terminalStages.has(session.stage)) {
            stopPolling();
          }
          return session;
        } catch (e) {
          // ignore
          return null;
        }
      }

      async function selectSession(sessionId) {
        currentSessionId = sessionId;
        lastProgressLen = 0;
        chatEl.innerHTML = "";
        addMessage("assistant", "已加载会话，正在获取状态...");
        const session = await pollSession(sessionId);
        if (currentSessionId === sessionId && session && !terminalStages.has(session.stage)) {
          startPolling(sessionId);
        }
      }

      async function createSession() {
        const requestText = inputEl.value.trim();
        if (!requestText) return;
        addMessage("user", requestText);
        inputEl.value = "";

        const form = new FormData();
        form.append("request", requestText);
        for (const file of selectedImages) form.append("images", file);
        selectedImages = [];
        imagesEl.value = "";
        renderSelectedImages();

        sendBtn.disabled = true;
        try {
          const r = await fetch("/api/sessions", { method: "POST", body: form });
          const session = await r.json();
          if (!r.ok) {
            addMessage("assistant", JSON.stringify(session, null, 2), "danger");
            return;
          }
          addMessage("assistant", `已创建会话：${session.session_id}\n后台开始生成中...`, "muted");
          await fetchSessions();
          await selectSession(session.session_id);
        } finally {
          sendBtn.disabled = false;
        }
      }

      async function sendFeedback() {
        if (!currentSessionId) return;
        const text = inputEl.value.trim();
        if (!text) return;
        addMessage("user", text);
        inputEl.value = "";
        const form = new FormData();
        form.append("feedback", text);
        feedbackBtn.disabled = true;
        try {
          const r = await fetch(`/api/sessions/${currentSessionId}/feedback`, { method: "POST", body: form });
          const session = await r.json();
          if (!r.ok) {
            addMessage("assistant", JSON.stringify(session, null, 2), "danger");
            return;
          }
          addMessage("assistant", "已收到反馈，后台开始重新生成...", "muted");
          lastProgressLen = 0;
          startPolling(currentSessionId);
          await pollSession(currentSessionId);
        } finally {
          feedbackBtn.disabled = false;
        }
      }

      newChatBtn.onclick = async () => {
        stopPolling();
        currentSessionId = "";
        lastProgressLen = 0;
        chatEl.innerHTML = "";
        metaEl.textContent = "未选择会话";
        setActions(null);
        addMessage("assistant", "请描述你要生成的视频。");
      };
      imagesEl.addEventListener("change", () => {
        const files = Array.from(imagesEl.files || []);
        const seen = new Set(selectedImages.map(fileSignature));
        let added = 0;
        let duplicates = 0;
        let overflow = 0;

        for (const file of files) {
          const signature = fileSignature(file);
          if (!file.type.startsWith("image/")) {
            continue;
          }
          if (seen.has(signature)) {
            duplicates += 1;
            continue;
          }
          if (selectedImages.length >= MAX_UPLOAD_IMAGES) {
            overflow += 1;
            continue;
          }
          seen.add(signature);
          selectedImages.push(file);
          added += 1;
        }

        imagesEl.value = "";

        const messages = [];
        if (added) messages.push(`已加入 ${added} 张`);
        if (duplicates) messages.push(`已忽略 ${duplicates} 张重复图片`);
        if (overflow) messages.push(`超出上限 ${overflow} 张，最多 ${MAX_UPLOAD_IMAGES} 张`);
        renderSelectedImages(messages.join("，"));
      });
      sendBtn.onclick = createSession;
      feedbackBtn.onclick = sendFeedback;

      (async function init() {
        addMessage("assistant", "Hi，我可以帮你产出各种素材视频，输入需求点击发送即可");
        await fetchSessions();
      })();
    </script>
  </body>
</html>
